<html>
<body>
    <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

<a-scene>

  <a-box color="red" position="0 2 -5" rotation="0 45 0" scale="2 2 2" animation="property: object3D.position.y; to:5.5; dir: alternate; dur: 2000; loop: true"></a-box>

  <a-box color="green" position="1 2.5 -3" rotation="0 45 0" color="red" height="1" animation="property: object3D.position.y; to:2.2; dir: alternate; dur: 2000; loop: true"></a-box>

  <a-cylinder color="purple" position="2 3 -3" rotation="0 45 0" height="1" scale= "1 1 1" animation="property: object3D.position.y; to:8.8; dir: alternate; dur: 2000; loop: true"></a-cylinder>

  <a-triangle color="pink" position="5 6 -9" rotation="0 45 0" height="1" scale="3 3 3" animation="property: object3D.position.y; to:2.2; dir: alternate; dur: 2000; loop: true"></a-triangle>

  <a-sphere color="navy" position="5 2 -6"></a-sphere>


  <a-assets>
  <img id="groundTexture" src="https://www.beachinaday.com/wp-content/uploads/2023/04/quartz-sand-1024x1024.jpg">
</a-assets>

<!-- ... -->
 <a-plane src="#groundTexture" rotation="-90 0 0" width="30" height="30"></a-plane>


 </a-scene>




</body>
</html>
