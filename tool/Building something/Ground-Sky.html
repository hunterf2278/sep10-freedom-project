<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

<a-scene>
  <a-cylinder id="ground" src="https://cdn.aframe.io/a-painter/images/floor.jpg" radius="32" height="0.1"></a-cylinder>
</a-scene>

<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

<a-scene>
  <a-assets>
    <img id="groundTexture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
    <img id="skyTexture" src="https://live.staticflickr.com/65535/55152677709_466f8b5c32_o.jpg">
  </a-assets>

  <a-sphere position="0 1.25 -5" radius="1.1" color="#EF2D5E"></a-sphere>

  <a-cylinder id="ground" src="#groundTexture" radius="30" height="0.1"></a-cylinder>

  <a-sky id="background" src="#skyTexture" theta-length="90" radius="30"></a-sky>
</a-scene>
            <a-box position="1 2.5 -3" rotation="0 45 0" color="#4CC3D9" height="1" animation="property: object3D.position.y; to:3.3; dir: alternate; dur: 2000; loop: true"></a-box>
    </a-scene>
  </body>
</html>
