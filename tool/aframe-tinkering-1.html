<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-box position="1 2.5 -3" rotation="0 45 0" color="#4CC3D9" height="1" animation="property: object3D.position.y; to:2.2; dir: alternate; dur: 2000; loop: true"></a-box>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1" color="pink"></a-cylinder>
      <a-cylinder position="1 1.50 -3" radius="0.5" height="2.2" color="lightblue"></a-cylinder>
      <a-triangle position="1 2.95 -3" radius="8.8" height="8" color="red"></a-triangle>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="7" height="4" color="#7BC8A4"></a-plane>
      <a-sky src="#skyTexture"></a-sky>
    </a-scene>





  </body>
</html>
